<!DOCTYPE html>
<html>
<head>
<title>SkillBridge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SkillBridge</h1>
<p>Connecting Rural Workers with Customers</p>
</header>

<div class="slide">

<!-- Slide 1 -->
<div class="page active">

<h2>Worker Registration</h2>

<input id="name" placeholder="Worker Name">
<input id="skill" placeholder="Skill">
<input id="phone" placeholder="Phone Number">

<button onclick="addWorker()">Register Worker</button>

</div>

<!-- Slide 2 -->
<div class="page">

<h2>Search Worker</h2>

<input id="search" placeholder="Search by skill" onkeyup="searchWorker()">

<div id="workerList"></div>

</div>

<!-- Slide 3 -->
<div class="page">

<h2>Post a Job</h2>

<input id="customer" placeholder="Customer Name">
<input id="job" placeholder="Job Description">

<button onclick="postJob()">Post Job</button>

<div id="jobList"></div>

</div>

</div>

<div class="navigation">

<button onclick="prevSlide()">Previous</button>
<button onclick="nextSlide()">Next</button>

</div>

<script src="script.js"></script>

</body>
</html>
