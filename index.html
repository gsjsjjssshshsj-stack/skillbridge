<!DOCTYPE html>
<html>
<head>
<title>SkillBridge Startup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>SkillBridge</h1>
<p>Connecting Rural Skilled Workers with Employers</p>
</header>

<div class="container">

<div class="card">
<h2>Worker Wallet</h2>
<p>Balance</p>
<h1 id="balance">₹2000</h1>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="addMoney()">Add Money</button>
<button onclick="withdrawMoney()">Withdraw</button>
</div>

<div class="card">
<h2>Worker Profile</h2>
<p>Name: Ramesh</p>
<p>Skill: Carpenter</p>
<p>Village: Rampuram</p>
</div>

<div class="card">
<h2>Available Jobs</h2>

<div class="job">
Carpenter Needed – ₹600/day
<button onclick="applyJob()">Apply</button>
</div>

<div class="job">
Electrician Work – ₹500/day
<button onclick="applyJob()">Apply</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
