<!DOCTYPE html>
<html>
<head>
<title>SkillBridge Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:220px;
background:#e8f5e9;
padding:20px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
cursor:pointer;
border:none;
background:#4caf50;
color:white;
}

.main{
flex:1;
padding:30px;
}

.section{
display:none;
background:white;
padding:20px;
border-radius:8px;
}

.section.active{
display:block;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

button.action{
padding:10px 15px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

.job{
background:#eee;
padding:15px;
margin:10px 0;
}

.chatbox{
background:#eee;
padding:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h1>SkillBridge Platform</h1>
</header>

<div class="container">

<div class="sidebar">

<button onclick="show('register')">Worker Register</button>

<button onclick="show('postjob')">Post Job</button>

<button onclick="show('jobs')">Job List</button>

<button onclick="show('wallet')">Wallet</button>

<button onclick="show('chat')">Chat</button>

</div>

<div class="main">

<div id="register" class="section active">

<h2>Worker Registration</h2>

<input placeholder="Worker Name">

<input placeholder="Skill">

<input placeholder="Village">

<input placeholder="Phone">

<button class="action">Register Worker</button>

</div>


<div id="postjob" class="section">

<h2>Post a Job</h2>

<input placeholder="Job Title">

<input placeholder="Location">

<input placeholder="Workers Needed">

<input placeholder="Wage Per Day">

<button class="action">Post Job</button>

</div>


<div id="jobs" class="section">

<h2>Available Jobs</h2>

<div class="job">

Carpenter Needed – ₹600/day

<button class="action" onclick="apply()">Apply</button>

</div>

<div class="job">

Electrician Needed – ₹500/day

<button class="action" onclick="apply()">Apply</button>

</div>

</div>


<div id="wallet" class="section">

<h2>Worker Wallet</h2>

<h3>Balance: ₹<span id="balance">1000</span></h3>

<input id="money" placeholder="Enter amount">

<button class="action" onclick="addMoney()">Add Money</button>

<button class="action" onclick="withdrawMoney()">Withdraw</button>

</div>


<div id="chat" class="section">

<h2>Chat With Employer</h2>

<div class="chatbox">

<p>Employer: Can you come tomorrow?</p>

<p>Worker: Yes I will come.</p>

</div>

<input placeholder="Type message">

<button class="action">Send</button>

</div>

</div>

</div>

<script>

function show(id){

let sections=document.querySelectorAll(".section");

sections.forEach(function(sec){

sec.classList.remove("active");

});

document.getElementById(id).classList.add("active");

}

function apply(){

alert("Application Sent to Employer");

}

let balance=1000;

function addMoney(){

let money=document.getElementById("money").value;

balance+=Number(money);

document.getElementById("balance").innerText=balance;

}

function withdrawMoney(){

let money=document.getElementById("money").value;

balance-=Number(money);

document.getElementById("balance").innerText=balance;

}

</script>

</body>
</html>
